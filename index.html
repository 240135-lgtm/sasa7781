<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов (Google Auth)</title>
    <style>
        :root { --primary-color: #007bff; --bg-color: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px; color: #333; }
        .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); width: 100%; max-width: 550px; margin-bottom: 20px; }
        h2 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .status-info-box { background: #eef6ff; border-radius: 12px; padding: 16px; margin-bottom: 20px; border-left: 4px solid var(--primary-color); }
        .info-row { display: flex; align-items: center; gap: 10px; font-size: 0.9rem; margin: 4px 0; }
        .info-row b { color: var(--primary-color); }
        .status-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0 25px 0; }
        .status-option { padding: 8px 16px; border: 1px solid #dee2e6; border-radius: 20px; background: white; cursor: pointer; font-size: 0.9rem; transition: all 0.2s ease; display: flex; align-items: center; gap: 6px; }
        .status-option:hover { border-color: var(--primary-color); background: #f8faff; }
        .status-option.active { background: var(--primary-color); color: white; border-color: var(--primary-color); box-shadow: 0 4px 10px rgba(0,123,255,0.2); }
        .btn-save { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #0056b3; }
        .btn-google { width: 100%; padding: 12px; background: white; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }
        .user-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f3f5; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 15px; }
        .username { font-weight: 600; flex-grow: 1; }
        .status-tag { font-size: 0.75rem; color: #6c757d; background: #f8f9fa; padding: 4px 10px; border-radius: 10px; border: 1px solid #eee; }
        #logoutBtn { background: none; border: none; color: #dc3545; cursor: pointer; font-size: 12px; text-decoration: underline; padding: 0; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Мой профиль</h2>
        <div id="authSection">
            <div class="status-info-box">Загрузка...</div>
        </div>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div id="groupList">Загрузка списка...</div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://ysqixhzrevitbcqmhhuz.supabase.co';
        const KEY = 'sb_publishable_1QFd7P35_JdzaMJLps-n7w_TPWQ0sDI';
        const supabase = createClient(URL, KEY);

        let currentUser = null;
        let tempStatus = { text: '', color: '' };

        // 1. Проверка авторизации
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            const authSection = document.getElementById('authSection');

            if (user) {
                currentUser = user;
                // Автоматически добавляем/обновляем пользователя в таблице profiles
                await supabase.from('profiles').upsert({
                    id: user.id,
                    username: user.user_metadata.full_name || user.email
                }, { onConflict: 'id' });

                renderProfileUI(user);
                fetchGroup();
            } else {
                authSection.innerHTML = `
                    <button class="btn-google" id="loginBtn">
                        <img src="https://www.google.com/favicon.ico" width="16"> Войти через Google
                    </button>
                `;
                document.getElementById('loginBtn').onclick = () => supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.href }
                });
                fetchGroup(); // Список группы видим всем
            }
        }

        // 2. Отрисовка интерфейса профиля
        function renderProfileUI(user) {
            const authSection = document.getElementById('authSection');
            authSection.innerHTML = `
                <div class="status-info-box">
                    <div class="info-row">👨‍💻 Вы зашли как: <b>${user.user_metadata.full_name || user.email}</b></div>
                    <div class="info-row">📌 Текущий статус: <span id="currentStatusText">загрузка...</span></div>
                    <button id="logoutBtn">Выйти из аккаунта</button>
                </div>
                <p style="font-size: 0.85rem; color: #666; margin-bottom: 5px;">Выберите статус:</p>
                <div class="status-grid" id="statusPicker">
                    <div class="status-option" onclick="prepStatus(this, '🟢 Онлайн', '#28a745')">🟢 Онлайн</div>
                    <div class="status-option" onclick="prepStatus(this, '☕ Отошёл', '#ffc107')">☕ Отошёл</div>
                    <div class="status-option" onclick="prepStatus(this, '⛔ Не беспокоить', '#dc3545')">⛔ Не беспокоить</div>
                    <div class="status-option" onclick="prepStatus(this, '🗣️ Встреча', '#007bff')">🗣️ Встреча</div>
                    <div class="status-option" onclick="prepStatus(this, '🍔 Обед', '#6f42c1')">🍔 Обед</div>
                </div>
                <button class="btn-save" onclick="applyStatus()">Сохранить статус</button>
            `;

            document.getElementById('logoutBtn').onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };
        }

        // Логика выбора и сохранения
        window.prepStatus = (element, text, color) => {
            document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            tempStatus = { text, color };
        };

        window.applyStatus = async () => {
            if (!currentUser) return alert("Сначала войдите!");
            if (!tempStatus.text) return alert("Выберите статус!");

            const { error } = await supabase
                .from('profiles')
                .update({ status: tempStatus.text, color: tempStatus.color })
                .eq('id', currentUser.id);

            if (error) alert("Ошибка обновления!");
            else { fetchGroup(); alert("Статус обновлен!"); }
        };

        async function fetchGroup() {
            const { data, error } = await supabase.from('profiles').select('*').order('username', { ascending: true });
            if (error) return;

            document.getElementById('groupList').innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div class="username">${user.username}</div>
                    <div class="status-tag">${user.status || 'Нет статуса'}</div>
                </div>
            `).join('');

            if (currentUser) {
                const me = data.find(u => u.id === currentUser.id);
                if (me && document.getElementById('currentStatusText')) {
                    document.getElementById('currentStatusText').innerText = me.status || 'не задан';
                }
            }
        }

        checkUser();
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
