<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов + Чат</title>
    <style>
        :root { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --primary-blue: #3b82f6;
            --danger-red: #e63946;
            --success-green: #2a9d8f;
            --warning-yellow: #ffb703;
            --secondary-grey: #6c757d;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            color: var(--text-main); 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 550px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .widget-header {
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .widget-timer {
            text-align: center;
            font-size: 2.2rem;
            color: var(--primary-blue);
            font-weight: bold;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-full {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: white;
            transition: 0.2s;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        .btn-half {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: white;
            transition: 0.2s;
        }

        .btn-red { background: var(--danger-red); }
        .btn-red:hover { background: #c1121f; }

        .btn-green { background: var(--success-green); }
        .btn-green:hover { background: #21867a; }

        .btn-yellow { background: var(--warning-yellow); color: #1e1e1e; }
        .btn-yellow:hover { background: #fb8500; }

        .btn-grey { background: var(--secondary-grey); }
        .btn-grey:hover { background: #495057; }

        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .user-item:last-child {
            border-bottom: none;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
            box-shadow: 0 0 8px rgba(255,255,255,0.1);
        }

        .username {
            font-weight: 600;
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-main);
        }

        .status-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: #2a2a2a;
            padding: 6px 12px;
            border-radius: 10px;
            border: 1px solid #444;
            white-space: nowrap;
        }

        .timer-badge {
            font-family: 'Segoe UI', monospace;
            background: #2a2a2a;
            color: #e0e0e0;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-right: 10px;
            font-weight: 600;
            border: 1px solid #444;
        }

        .online-pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success-green);
            border-radius: 50%;
            box-shadow: 0 0 0 rgba(42, 157, 143, 0.4);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 157, 143, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(42, 157, 143, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 157, 143, 0); }
        }

        /* ЧАТ */
        .chat-box {
            height: 220px;
            background: #181818;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .chat-message {
            margin-bottom: 8px;
            line-height: 1.4;
            word-break: break-word;
        }

        .chat-name {
            font-weight: bold;
            color: var(--text-main);
        }

        .chat-text {
            color: var(--text-main);
        }

        .chat-input-row {
            display: flex;
            gap: 8px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background: #121212;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .chat-send {
            width: 52px;
            border: none;
            border-radius: 10px;
            background: var(--success-green);
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .chat-send:hover {
            background: #21867a;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Мой профиль</h2>
        <div id="authSection">
            <div style="text-align: center; color: var(--text-muted);">Загрузка...</div>
        </div>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div id="groupList">
            <div style="text-align: center; color: var(--text-muted);">Загрузка списка...</div>
        </div>
    </div>

    <div class="card">
        <h2>💬 Общий чат</h2>

        <div id="chatBox" class="chat-box">
            <div style="color: var(--text-muted);">Загрузка сообщений...</div>
        </div>

        <div class="chat-input-row">
            <input id="chatInput" class="chat-input" placeholder="Сообщение..." />
            <button id="sendMessageBtn" class="chat-send">➤</button>
        </div>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://ysqixhzrevitbcqmhhuz.supabase.co';
        const KEY = 'sb_publishable_1QFd7P35_JdzaMJLps-n7w_TPWQ0sDI';
        const supabase = createClient(URL, KEY);

        let currentUser = null;
        let myStartTime = null;

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            const authSection = document.getElementById('authSection');

            if (user) {
                currentUser = user;

                await supabase.from('profiles').upsert({
                    id: user.id,
                    username: user.user_metadata.full_name || user.email
                }, { onConflict: 'id' });

                renderProfileWidget(user);
                fetchGroup();
            } else {
                authSection.innerHTML = `
                    <button class="btn-google" id="loginBtn">
                        <img src="https://www.google.com/favicon.ico" width="16"> Войти через Google
                    </button>
                `;

                document.getElementById('loginBtn').onclick = () => {
                    supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: window.location.href }
                    });
                };

                fetchGroup();
            }

            loadMessages();
        }

        function renderProfileWidget(user) {
            const authSection = document.getElementById('authSection');

            authSection.innerHTML = `
                <div class="widget-header">${user.user_metadata.full_name || user.email}</div>

                <div class="widget-timer">
                    ⏱️ <span id="mainTimerText">0 сек.</span>
                </div>

                <button class="btn-full btn-green" id="btnStart" style="display:none;" onclick="setStatus('🟢 Онлайн', '#2a9d8f', true)">
                    ▶️ Начать сессию
                </button>

                <button class="btn-full btn-red" id="btnEnd" style="display:none;" onclick="setStatus('🔴 Офлайн', '#e63946', false)">
                    ⛔ Завершить сессию
                </button>

                <div class="btn-row">
                    <button class="btn-half btn-yellow" onclick="setStatus('☕ Перерыв', '#ffb703', false)">
                        ☕ Перерыв
                    </button>

                    <button class="btn-half btn-grey" id="btnLogout">
                        Выход
                    </button>
                </div>
            `;

            document.getElementById('btnLogout').onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };
        }

        window.setStatus = async (text, color, startTimer) => {
            if (!currentUser) return;

            const payload = {
                status: text,
                color: color
            };

            if (startTimer) {
                payload.study_start_time = new Date().toISOString();
            } else {
                payload.study_start_time = null;
            }

            const { error } = await supabase
                .from('profiles')
                .update(payload)
                .eq('id', currentUser.id);

            if (error) {
                console.error(error);
                alert("Ошибка! Проверьте, добавили ли вы колонку study_start_time в базу.");
            } else {
                fetchGroup();
            }
        };

        function formatTime(diffMs) {
            if (diffMs < 0) return '0 сек.';

            let totalSeconds = Math.floor(diffMs / 1000);
            let hours = Math.floor(totalSeconds / 3600);

            totalSeconds %= 3600;

            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            if (hours === 0 && minutes === 0) {
                return `${seconds} сек.`;
            }

            let text = '';

            if (hours > 0) {
                text += `${hours}ч. `;
            }

            text += `${minutes}м. ${seconds}с.`;

            return text;
        }

        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error(error);
                return;
            }

            document.getElementById('groupList').innerHTML = data.map(user => {
                const isOnline = user.status === '🟢 Онлайн';

                const pulseHtml = isOnline
                    ? `<span class="online-pulse" title="Сейчас в учебе"></span>`
                    : '';

                const timerHtml = isOnline && user.study_start_time
                    ? `<div class="timer-badge" data-start="${user.study_start_time}">...</div>`
                    : '';

                return `
                    <div class="user-item">
                        <div class="status-dot" style="background: ${user.color || '#555'}"></div>
                        <div class="username">${escapeHtml(user.username || 'Без имени')} ${pulseHtml}</div>
                        ${timerHtml}
                        <div class="status-tag">${user.status || 'Нет статуса'}</div>
                    </div>
                `;
            }).join('');

            if (currentUser) {
                const me = data.find(u => u.id === currentUser.id);

                if (me) {
                    const isOnline = me.status === '🟢 Онлайн';

                    const btnStart = document.getElementById('btnStart');
                    const btnEnd = document.getElementById('btnEnd');

                    if (btnStart && btnEnd) {
                        btnStart.style.display = isOnline ? 'none' : 'flex';
                        btnEnd.style.display = isOnline ? 'flex' : 'none';
                    }

                    myStartTime = isOnline ? me.study_start_time : null;

                    const mainTimerEl = document.getElementById('mainTimerText');

                    if (!isOnline && mainTimerEl) {
                        mainTimerEl.innerText = me.status === '☕ Перерыв' ? 'На паузе' : '0 сек.';
                    }
                }
            }
        }

        /* ЧАТ */

        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true })
                .limit(50);

            if (error) {
                console.error(error);
                document.getElementById('chatBox').innerHTML = `
                    <div style="color: var(--danger-red);">
                        Ошибка загрузки чата. Проверь таблицу messages.
                    </div>
                `;
                return;
            }

            renderMessages(data);
        }

        function renderMessages(messages) {
            const chatBox = document.getElementById('chatBox');

            if (!messages || messages.length === 0) {
                chatBox.innerHTML = `
                    <div style="color: var(--text-muted);">
                        Пока сообщений нет. Напиши первым.
                    </div>
                `;
                return;
            }

            chatBox.innerHTML = messages.map(msg => `
                <div class="chat-message">
                    <span class="chat-name">${escapeHtml(msg.username)}:</span>
                    <span class="chat-text">${escapeHtml(msg.text)}</span>
                </div>
            `).join('');

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            if (!currentUser) {
                alert('Сначала войдите через Google');
                return;
            }

            const input = document.getElementById('chatInput');
            const text = input.value.trim();

            if (!text) return;

            const username = currentUser.user_metadata.full_name || currentUser.email;

            const { error } = await supabase.from('messages').insert({
                user_id: currentUser.id,
                username: username,
                text: text
            });

            if (error) {
                console.error(error);
                alert('Ошибка отправки сообщения. Проверь таблицу messages и политики RLS.');
                return;
            }

            input.value = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.innerText = text || '';
            return div.innerHTML;
        }

        document.getElementById('sendMessageBtn').onclick = sendMessage;

        document.getElementById('chatInput').addEventListener('keydown', event => {
            if (event.key === 'Enter') {
                sendMessage();
            }
        });

        supabase
            .channel('public-messages')
            .on(
                'postgres_changes',
                { event: '*', schema: 'public', table: 'messages' },
                () => loadMessages()
            )
            .subscribe();

        setInterval(() => {
            const now = new Date().getTime();

            document.querySelectorAll('.timer-badge').forEach(el => {
                const startStr = el.getAttribute('data-start');
                if (!startStr) return;

                const diff = now - new Date(startStr).getTime();
                el.innerText = formatTime(diff);
            });

            if (myStartTime && document.getElementById('mainTimerText')) {
                const diff = now - new Date(myStartTime).getTime();
                document.getElementById('mainTimerText').innerText = formatTime(diff);
            }
        }, 1000);

        checkUser();

        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
