<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов (Google Auth)</title>
    <style>
        /* ТЕМНАЯ ТЕМА */
        :root { 
            --bg-color: #121212; 
            --card-bg: #1e1e1e; 
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #333333;
            --primary-blue: #3b82f6;
            --danger-red: #e63946;
            --success-green: #2a9d8f;
            --warning-yellow: #ffb703;
            --secondary-grey: #6c757d;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: var(--bg-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            color: var(--text-main); 
        }

        .card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 24px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 550px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color);
        }

        h2 { margin-top: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; color: var(--text-main); border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        
        /* ВИДЖЕТ ПРОФИЛЯ (Как на скрине) */
        .widget-header { text-align: center; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; color: var(--text-main); }
        .widget-timer { text-align: center; font-size: 2.2rem; color: var(--primary-blue); font-weight: bold; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .btn-full { width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; border: none; cursor: pointer; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 8px; color: white; transition: 0.2s; }
        .btn-row { display: flex; gap: 12px; }
        .btn-half { flex: 1; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 1rem; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; color: white; transition: 0.2s; }
        
        .btn-red { background: var(--danger-red); }
        .btn-red:hover { background: #c1121f; }
        .btn-green { background: var(--success-green); }
        .btn-green:hover { background: #21867a; }
        .btn-yellow { background: var(--warning-yellow); color: #1e1e1e; }
        .btn-yellow:hover { background: #fb8500; }
        .btn-grey { background: var(--secondary-grey); }
        .btn-grey:hover { background: #495057; }

        .btn-google { width: 100%; padding: 12px; background: white; color: #333; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; }

        /* СПИСОК ГРУППЫ */
        .user-item { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border-color); }
        .user-item:last-child { border-bottom: none; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 15px; flex-shrink: 0; box-shadow: 0 0 8px rgba(255,255,255,0.1); }
        .username { font-weight: 600; flex-grow: 1; display: flex; align-items: center; gap: 8px; color: var(--text-main); }
        .status-tag { font-size: 0.75rem; color: var(--text-muted); background: #2a2a2a; padding: 6px 12px; border-radius: 10px; border: 1px solid #444; white-space: nowrap; }
        
        .timer-badge { font-family: 'Segoe UI', monospace; background: #2a2a2a; color: #e0e0e0; padding: 4px 8px; border-radius: 6px; font-size: 0.85rem; margin-right: 10px; font-weight: 600; border: 1px solid #444; }

        .online-pulse {
            display: inline-block; width: 8px; height: 8px; background-color: var(--success-green); border-radius: 50%;
            box-shadow: 0 0 0 rgba(42, 157, 143, 0.4); animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 157, 143, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(42, 157, 143, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 157, 143, 0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>👤 Мой профиль</h2>
        <div id="authSection">
            <div style="text-align: center; color: var(--text-muted);">Загрузка...</div>
        </div>
    </div>

    <div class="card">
        <h2>👥 Монитор группы</h2>
        <div id="groupList"><div style="text-align: center; color: var(--text-muted);">Загрузка списка...</div></div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const URL = 'https://ysqixhzrevitbcqmhhuz.supabase.co';
        const KEY = 'sb_publishable_1QFd7P35_JdzaMJLps-n7w_TPWQ0sDI';
        const supabase = createClient(URL, KEY);

        let currentUser = null;
        let myStartTime = null; // Глобальная переменная для таймера текущего юзера

        // 1. Проверка авторизации
        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            const authSection = document.getElementById('authSection');

            if (user) {
                currentUser = user;
                await supabase.from('profiles').upsert({
                    id: user.id,
                    username: user.user_metadata.full_name || user.email
                }, { onConflict: 'id' });

                renderProfileWidget(user);
                fetchGroup();
            } else {
                authSection.innerHTML = `
                    <button class="btn-google" id="loginBtn">
                        <img src="https://www.google.com/favicon.ico" width="16"> Войти через Google
                    </button>
                `;
                document.getElementById('loginBtn').onclick = () => supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: { redirectTo: window.location.href }
                });
                fetchGroup(); 
            }
        }

        // 2. Отрисовка нового виджета (как на скриншоте)
        function renderProfileWidget(user) {
            const authSection = document.getElementById('authSection');
            authSection.innerHTML = `
                <div class="widget-header">${user.user_metadata.full_name || user.email}</div>
                <div class="widget-timer">
                    ⏱️ <span id="mainTimerText">0 сек.</span>
                </div>
                
                <button class="btn-full btn-green" id="btnStart" style="display:none;" onclick="setStatus('🟢 Онлайн', '#2a9d8f', true)">
                    ▶️ Начать сессию
                </button>

                <button class="btn-full btn-red" id="btnEnd" style="display:none;" onclick="setStatus('🔴 Офлайн', '#e63946', false)">
                    ⛔ Завершить сессию
                </button>

                <div class="btn-row">
                    <button class="btn-half btn-yellow" onclick="setStatus('☕ Перерыв', '#ffb703', false)">
                        ☕ Перерыв
                    </button>
                    <button class="btn-half btn-grey" id="btnLogout">
                        Выход
                    </button>
                </div>
            `;

            document.getElementById('btnLogout').onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };
        }

        // Логика установки статуса (вызывается из кнопок)
        window.setStatus = async (text, color, startTimer) => {
            if (!currentUser) return;

            const payload = { status: text, color: color };
            
            // Если начинаем сессию - записываем время. Иначе - сбрасываем.
            if (startTimer) {
                payload.study_start_time = new Date().toISOString();
            } else {
                payload.study_start_time = null;
            }

            const { error } = await supabase.from('profiles').update(payload).eq('id', currentUser.id);

            if (error) {
                console.error(error);
                alert("Ошибка! Проверьте, добавили ли вы колонку study_start_time в базу.");
            } else { 
                fetchGroup(); 
            }
        };

        // Вспомогательная функция для форматирования времени
        function formatTime(diffMs) {
            if (diffMs < 0) return '0 сек.';
            let totalSeconds = Math.floor(diffMs / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            totalSeconds %= 3600;
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            if (hours === 0 && minutes === 0) return `${seconds} сек.`;
            let text = '';
            if (hours > 0) text += `${hours}ч. `;
            text += `${minutes}м. ${seconds}с.`;
            return text;
        }

        // Загрузка списка всех пользователей
        async function fetchGroup() {
            const { data, error } = await supabase.from('profiles').select('*').order('username', { ascending: true });
            if (error) return;

            // 1. Обновляем список группы
            document.getElementById('groupList').innerHTML = data.map(user => {
                const isOnline = user.status === '🟢 Онлайн';
                const pulseHtml = isOnline ? `<span class="online-pulse" title="Сейчас в учебе"></span>` : '';
                const timerHtml = (isOnline && user.study_start_time) 
                    ? `<div class="timer-badge" data-start="${user.study_start_time}">...</div>` 
                    : '';

                return `
                    <div class="user-item">
                        <div class="status-dot" style="background: ${user.color || '#555'}"></div>
                        <div class="username">${user.username} ${pulseHtml}</div>
                        ${timerHtml}
                        <div class="status-tag">${user.status || 'Нет статуса'}</div>
                    </div>
                `;
            }).join('');

            // 2. Обновляем виджет текущего пользователя (переключаем кнопки старт/стоп)
            if (currentUser) {
                const me = data.find(u => u.id === currentUser.id);
                if (me) {
                    const isOnline = me.status === '🟢 Онлайн';
                    
                    // Переключаем видимость кнопок
                    const btnStart = document.getElementById('btnStart');
                    const btnEnd = document.getElementById('btnEnd');
                    if(btnStart && btnEnd) {
                        btnStart.style.display = isOnline ? 'none' : 'flex';
                        btnEnd.style.display = isOnline ? 'flex' : 'none';
                    }

                    // Устанавливаем время для главного таймера виджета
                    myStartTime = isOnline ? me.study_start_time : null;
                    
                    // Если мы не онлайн, сбрасываем текст таймера
                    const mainTimerEl = document.getElementById('mainTimerText');
                    if (!isOnline && mainTimerEl) {
                        mainTimerEl.innerText = me.status === '☕ Перерыв' ? 'На паузе' : '0 сек.';
                    }
                }
            }
        }

        // Ежесекундный интервал для обновления всех таймеров на экране
        setInterval(() => {
            const now = new Date().getTime();

            // 1. Обновляем таймеры в списке группы
            document.querySelectorAll('.timer-badge').forEach(el => {
                const startStr = el.getAttribute('data-start');
                if (!startStr) return;
                const diff = now - new Date(startStr).getTime();
                el.innerText = formatTime(diff);
            });

            // 2. Обновляем главный крупный таймер в виджете профиля
            if (myStartTime && document.getElementById('mainTimerText')) {
                const diff = now - new Date(myStartTime).getTime();
                document.getElementById('mainTimerText').innerText = formatTime(diff);
            }
        }, 1000);

        checkUser();
        // Запрашиваем актуальные данные из БД каждые 5 секунд
        setInterval(fetchGroup, 5000);
    </script>
</body>
</html>
